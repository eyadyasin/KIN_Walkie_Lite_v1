<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KIN Walkie Lite Invite</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: #f8fafc;
    }
    .card {
      max-width: 520px;
      margin: 40px auto;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }
    h1 { margin-top: 0; font-size: 24px; }
    p { line-height: 1.5; color: #cbd5e1; }
    .status { color: #93c5fd; font-weight: 700; }
    a.button {
      display: block;
      text-align: center;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #38bdf8;
      color: #082f49;
      font-weight: bold;
      text-decoration: none;
    }
    .secondary {
      background: #1f2937 !important;
      color: #e5e7eb !important;
      border: 1px solid #475569;
    }
    code { word-break: break-all; color: #93c5fd; }
    .small { font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>KIN Walkie Lite Invite</h1>
    <p id="status" class="status">Opening KIN...</p>
    <p>If KIN does not open automatically, use the buttons below.</p>
    <p>Invite token:<br><code id="tokenText">loading...</code></p>
    <a id="openApp" class="button" href="#">Open KIN</a>
    <a id="downloadApk" class="button secondary" href="#">Download / Update APK</a>
    <p class="small">After installing or updating KIN, open this invite link again.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = (params.get('token') || '').trim();

    const apkLink = 'https://github.com/eyadyasin/KIN_Walkie_Lite_v1/releases/latest/download/KIN_Walkie_Lite_v1.0.apk';
    const deepLink = token
      ? `kinwalkie://invite?token=${encodeURIComponent(token)}`
      : 'kinwalkie://invite';

    const statusEl = document.getElementById('status');
    const tokenEl = document.getElementById('tokenText');
    const openAppEl = document.getElementById('openApp');
    const downloadEl = document.getElementById('downloadApk');

    tokenEl.textContent = token || 'missing token';
    openAppEl.href = deepLink;
    downloadEl.href = apkLink;

    let fallbackTimer = null;
    let didLeavePage = false;

    function markOpenedOrLeaving() {
      didLeavePage = true;
      if (fallbackTimer) clearTimeout(fallbackTimer);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) markOpenedOrLeaving();
    });
    window.addEventListener('pagehide', markOpenedOrLeaving);
    window.addEventListener('blur', () => {
      // Android often blurs the browser when the app picker or app opens.
      setTimeout(() => {
        if (document.hidden) markOpenedOrLeaving();
      }, 250);
    });

    function tryOpenKin() {
      if (!token) {
        statusEl.textContent = 'Invalid invite link: missing token.';
        return;
      }

      statusEl.textContent = 'Trying to open KIN...';

      fallbackTimer = setTimeout(() => {
        if (didLeavePage || document.hidden) return;
        statusEl.textContent = 'KIN did not open. Downloading update...';
        window.location.href = apkLink;
      }, 2400);

      // Delay a little so the page renders before trying to switch apps.
      setTimeout(() => {
        window.location.href = deepLink;
      }, 450);
    }

    openAppEl.addEventListener('click', (event) => {
      event.preventDefault();
      tryOpenKin();
    });

    tryOpenKin();
  </script>
</body>
</html>
